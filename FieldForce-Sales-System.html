<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FieldForce — Sales Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --orange: #F05A1A;
      --orange-light: #FF7A40;
      --orange-pale: #FEF3ED;
      --orange-dark: #D44610;
      --orange-border: rgba(240,90,26,0.18);
      --white: #FFFFFF;
      --off-white: #FAFAF8;
      --gray-50: #F6F5F3;
      --gray-100: #EDECEA;
      --gray-200: #D8D6D2;
      --gray-400: #9E9B95;
      --gray-600: #6B6760;
      --gray-800: #2C2A26;
      --black: #16140F;
      --success: #1D9C5A;
      --success-pale: #EDFAF4;
      --danger: #D63B3B;
      --danger-pale: #FEF0F0;
      --warning: #C98A0A;
      --warning-pale: #FEFAED;
      --info: #2563EB;
      --info-pale: #EFF6FF;
      --shadow-xs: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-sm: 0 1px 4px rgba(0,0,0,0.07), 0 2px 8px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.09), 0 1px 4px rgba(0,0,0,0.05);
      --shadow-lg: 0 12px 40px rgba(0,0,0,0.12), 0 4px 12px rgba(0,0,0,0.06);
      --shadow-orange: 0 6px 20px rgba(240,90,26,0.22);
      --radius-sm: 6px;
      --radius: 10px;
      --radius-lg: 14px;
      --radius-xl: 20px;
      --sidebar-width: 252px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--off-white);
      color: var(--gray-800);
      min-height: 100vh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── TYPOGRAPHY ── */
    .display { font-family: 'Playfair Display', serif; }

    /* ── LOGIN ── */
    .login-page {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .login-hero {
      background: var(--orange);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 64px;
      position: relative;
      overflow: hidden;
    }

    .login-hero::before {
      content: '';
      position: absolute;
      width: 420px; height: 420px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 50%;
      top: -120px; right: -120px;
    }
    .login-hero::after {
      content: '';
      position: absolute;
      width: 280px; height: 280px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 50%;
      bottom: -60px; left: -60px;
    }

    .hero-brand {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 64px;
    }
    .hero-brand-mark {
      width: 42px; height: 42px;
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .hero-brand-mark svg { width: 22px; height: 22px; color: white; }
    .hero-brand-name {
      font-family: 'Playfair Display', serif;
      font-size: 22px; font-weight: 700;
      color: white; letter-spacing: -0.3px;
    }

    .hero-headline {
      font-family: 'Playfair Display', serif;
      font-size: 42px; font-weight: 800;
      color: white; line-height: 1.15;
      letter-spacing: -0.5px;
      margin-bottom: 20px;
      position: relative; z-index: 1;
    }
    .hero-sub {
      font-size: 15px; color: rgba(255,255,255,0.75);
      line-height: 1.6; max-width: 340px;
      position: relative; z-index: 1;
    }

    .hero-pillars {
      display: flex; gap: 20px; margin-top: 56px;
      position: relative; z-index: 1;
    }
    .hero-pillar {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: var(--radius);
      padding: 16px 18px;
      flex: 1;
    }
    .hero-pillar-num {
      font-family: 'Playfair Display', serif;
      font-size: 26px; font-weight: 700; color: white;
    }
    .hero-pillar-label {
      font-size: 11px; color: rgba(255,255,255,0.65);
      text-transform: uppercase; letter-spacing: 0.8px; margin-top: 3px;
    }

    .login-form-side {
      background: var(--white);
      display: flex; align-items: center; justify-content: center;
      padding: 48px;
    }

    .login-card {
      width: 100%; max-width: 400px;
      animation: fadeUp 0.45s ease;
    }

    .login-card-heading {
      font-family: 'Playfair Display', serif;
      font-size: 28px; font-weight: 700;
      color: var(--black); margin-bottom: 6px;
    }
    .login-card-sub { font-size: 14px; color: var(--gray-600); margin-bottom: 32px; }

    /* Role tabs */
    .role-tabs {
      display: flex; gap: 0;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius);
      margin-bottom: 28px;
      overflow: hidden;
    }
    .role-tab {
      flex: 1; padding: 10px 8px;
      border: none; background: transparent;
      font-family: 'Inter', sans-serif;
      font-size: 13px; font-weight: 500;
      color: var(--gray-600);
      cursor: pointer;
      transition: all 0.18s;
      border-right: 1px solid var(--gray-200);
    }
    .role-tab:last-child { border-right: none; }
    .role-tab.active {
      background: var(--orange);
      color: white; font-weight: 600;
    }

    /* Form */
    .form-group { margin-bottom: 18px; }
    .form-label {
      display: block; font-size: 12.5px; font-weight: 600;
      color: var(--gray-800); margin-bottom: 7px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .form-input, .form-select, .textarea {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius);
      font-family: 'Inter', sans-serif;
      font-size: 14px; color: var(--gray-800);
      background: var(--white);
      transition: border-color 0.18s, box-shadow 0.18s;
      outline: none;
    }
    .form-input:focus, .form-select:focus, .textarea:focus {
      border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(240,90,26,0.1);
    }
    .form-select { cursor: pointer; appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%239E9B95' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat; background-position: right 14px center;
      padding-right: 36px;
    }
    .textarea { resize: vertical; min-height: 86px; line-height: 1.5; }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 7px;
      padding: 10px 18px;
      border: none; border-radius: var(--radius);
      font-family: 'Inter', sans-serif;
      font-size: 13.5px; font-weight: 600;
      cursor: pointer; transition: all 0.18s;
      text-decoration: none; white-space: nowrap;
    }
    .btn-primary {
      background: var(--orange); color: white;
    }
    .btn-primary:hover { background: var(--orange-dark); box-shadow: var(--shadow-orange); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary-lg {
      width: 100%; padding: 13px; font-size: 15px;
      border-radius: var(--radius-lg); margin-top: 6px;
    }
    .btn-secondary { background: var(--gray-100); color: var(--gray-800); }
    .btn-secondary:hover { background: var(--gray-200); }
    .btn-success { background: var(--success); color: white; }
    .btn-success:hover { opacity: 0.88; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-danger:hover { opacity: 0.88; }
    .btn-outline {
      background: transparent;
      border: 1.5px solid var(--orange);
      color: var(--orange);
    }
    .btn-outline:hover { background: var(--orange-pale); }
    .btn-ghost { background: transparent; color: var(--gray-600); }
    .btn-ghost:hover { background: var(--gray-50); color: var(--gray-800); }
    .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: var(--radius-sm); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; pointer-events: none; }

    /* Hint box */
    .hint-box {
      background: var(--orange-pale);
      border: 1px solid var(--orange-border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-top: 20px;
      font-size: 12.5px;
      color: var(--orange-dark);
    }
    .hint-title {
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px;
      color: var(--orange); margin-bottom: 8px;
    }
    .hint-row { margin-bottom: 6px; }
    .hint-row:last-child { margin-bottom: 0; }
    .hint-name { font-weight: 600; margin-bottom: 1px; font-size: 12px; }
    .hint-cred { font-size: 11.5px; color: var(--orange-dark); opacity: 0.85; }

    /* ── SIDEBAR LAYOUT ── */
    .app-layout { display: flex; min-height: 100vh; }

    .sidebar {
      width: var(--sidebar-width);
      background: var(--black);
      display: flex; flex-direction: column;
      position: fixed; top: 0; left: 0; bottom: 0;
      z-index: 100;
      animation: sidebarIn 0.3s ease;
    }
    @keyframes sidebarIn {
      from { transform: translateX(-100%); }
      to { transform: translateX(0); }
    }

    .sidebar-header {
      padding: 28px 20px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .sidebar-brand {
      display: flex; align-items: center; gap: 10px;
    }
    .sidebar-brand-mark {
      width: 34px; height: 34px;
      background: var(--orange);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
    }
    .sidebar-brand-mark svg { width: 18px; height: 18px; color: white; }
    .sidebar-brand-name {
      font-family: 'Playfair Display', serif;
      font-size: 18px; font-weight: 700; color: white;
    }
    .sidebar-brand-name span { color: var(--orange); }

    .sidebar-nav {
      flex: 1;
      padding: 16px 12px;
      overflow-y: auto;
    }
    .nav-section-label {
      font-size: 9.5px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.2px;
      color: rgba(255,255,255,0.25);
      padding: 0 10px; margin-bottom: 6px;
    }

    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 13.5px; font-weight: 500;
      color: rgba(255,255,255,0.52);
      border: none; background: transparent;
      width: 100%; text-align: left;
      transition: all 0.16s; margin-bottom: 2px;
      position: relative;
    }
    .nav-item:hover {
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.88);
    }
    .nav-item.active {
      background: rgba(240,90,26,0.16);
      color: var(--orange-light);
      font-weight: 600;
    }
    .nav-item.active::before {
      content: '';
      position: absolute; left: 0; top: 50%;
      transform: translateY(-50%);
      width: 3px; height: 18px;
      background: var(--orange);
      border-radius: 0 3px 3px 0;
    }
    .nav-icon {
      width: 18px; height: 18px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .nav-icon svg { width: 16px; height: 16px; }
    .nav-badge {
      margin-left: auto;
      background: var(--orange);
      color: white;
      font-size: 10px; font-weight: 700;
      padding: 2px 6px;
      border-radius: 20px; min-width: 18px; text-align: center;
    }

    .sidebar-footer {
      padding: 16px 16px 20px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .sidebar-user {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 12px;
    }
    .sidebar-avatar {
      width: 36px; height: 36px;
      border-radius: 9px;
      background: var(--orange);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: white;
      font-family: 'Playfair Display', serif;
      flex-shrink: 0;
    }
    .sidebar-user-name {
      font-size: 13px; font-weight: 600; color: white;
      line-height: 1.2;
    }
    .sidebar-user-role {
      font-size: 11px; color: rgba(255,255,255,0.38);
      margin-top: 2px;
    }
    .logout-btn {
      width: 100%; padding: 9px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius);
      color: rgba(255,255,255,0.45);
      font-family: 'Inter', sans-serif;
      font-size: 12.5px; font-weight: 600;
      cursor: pointer; transition: all 0.18s;
      letter-spacing: 0.3px;
    }
    .logout-btn:hover {
      background: rgba(214,59,59,0.16);
      border-color: rgba(214,59,59,0.25);
      color: #ff8080;
    }

    /* ── MAIN CONTENT ── */
    .main-content {
      margin-left: var(--sidebar-width);
      flex: 1; padding: 36px 40px;
      animation: fadeIn 0.28s ease;
      min-height: 100vh;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── TOPBAR ── */
    .topbar {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 32px; gap: 16px;
    }
    .page-title {
      font-family: 'Playfair Display', serif;
      font-size: 28px; font-weight: 700;
      color: var(--black); letter-spacing: -0.3px;
    }
    .page-sub { font-size: 13.5px; color: var(--gray-600); margin-top: 3px; }

    /* ── STAT CARDS ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(172px, 1fr));
      gap: 16px; margin-bottom: 32px;
    }
    .stat-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 22px 24px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--gray-100);
      transition: transform 0.18s, box-shadow 0.18s;
      position: relative; overflow: hidden;
    }
    .stat-card::after {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 3px; background: var(--orange);
      opacity: 0; transition: opacity 0.18s;
    }
    .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .stat-card:hover::after { opacity: 1; }
    .stat-card-label {
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.8px;
      color: var(--gray-400); margin-bottom: 10px;
    }
    .stat-card-value {
      font-family: 'Playfair Display', serif;
      font-size: 36px; font-weight: 700;
      color: var(--black); line-height: 1;
    }
    .stat-card-value.accent { color: var(--orange); }

    /* ── CONTENT CARD ── */
    .card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 28px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--gray-100);
      margin-bottom: 24px;
    }
    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 22px;
    }
    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 17px; font-weight: 700;
      color: var(--black);
    }

    /* ── TABLES ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
    thead th {
      text-align: left; padding: 10px 16px;
      font-size: 10.5px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.8px;
      color: var(--gray-400);
      border-bottom: 1.5px solid var(--gray-100);
    }
    tbody td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--gray-100);
      color: var(--gray-800); vertical-align: middle;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr { transition: background 0.12s; }
    tbody tr:hover { background: var(--gray-50); }
    td strong { font-weight: 600; color: var(--black); }

    /* ── BADGES ── */
    .badge {
      display: inline-flex; align-items: center;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.3px;
    }
    .badge-assigned  { background: var(--info-pale); color: var(--info); }
    .badge-ongoing   { background: var(--orange-pale); color: var(--orange); }
    .badge-completed { background: var(--success-pale); color: var(--success); }
    .badge-incomplete{ background: var(--danger-pale); color: var(--danger); }
    .badge-pending   { background: var(--warning-pale); color: var(--warning); }
    .badge-approved  { background: var(--success-pale); color: var(--success); }
    .badge-rejected  { background: var(--danger-pale); color: var(--danger); }
    .badge-admin     { background: var(--orange-pale); color: var(--orange); }
    .badge-manager   { background: var(--info-pale); color: var(--info); }
    .badge-sp        { background: var(--success-pale); color: var(--success); }
    .badge-expense   { background: var(--warning-pale); color: var(--warning); }
    .badge-followup  { background: var(--info-pale); color: var(--info); }
    .badge-leave     { background: var(--gray-50); color: var(--gray-600); }

    /* ── TASK CARDS ── */
    .task-card {
      background: var(--white);
      border: 1.5px solid var(--gray-100);
      border-radius: var(--radius-lg);
      padding: 20px 22px;
      margin-bottom: 12px;
      transition: box-shadow 0.18s, transform 0.18s, border-color 0.18s;
      animation: fadeUp 0.3s ease;
    }
    .task-card:hover {
      box-shadow: var(--shadow-md);
      border-color: var(--gray-200);
      transform: translateY(-1px);
    }
    .task-card-header {
      display: flex; align-items: flex-start;
      justify-content: space-between; margin-bottom: 10px; gap: 12px;
    }
    .task-name {
      font-family: 'Playfair Display', serif;
      font-size: 15.5px; font-weight: 700; color: var(--black);
      line-height: 1.3;
    }
    .task-meta {
      display: flex; flex-wrap: wrap; gap: 14px; margin-top: 8px;
    }
    .task-meta-item {
      display: flex; align-items: center; gap: 5px;
      font-size: 12.5px; color: var(--gray-600);
    }
    .task-meta-item svg { width: 13px; height: 13px; opacity: 0.7; }
    .task-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }

    .task-note {
      background: var(--gray-50);
      border-left: 3px solid var(--orange);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      padding: 10px 14px;
      font-size: 13px; color: var(--gray-800);
      margin-top: 12px; line-height: 1.5;
    }
    .task-note-label { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--orange); margin-bottom: 3px; }

    /* ── FILTER BAR ── */
    .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 22px; }
    .filter-btn {
      padding: 7px 16px;
      border: 1.5px solid var(--gray-200);
      border-radius: 24px;
      background: white; font-family: 'Inter', sans-serif;
      font-size: 12.5px; font-weight: 500;
      cursor: pointer; color: var(--gray-600); transition: all 0.15s;
    }
    .filter-btn.active {
      border-color: var(--orange); color: var(--orange);
      background: var(--orange-pale); font-weight: 600;
    }
    .filter-btn:hover:not(.active) {
      border-color: var(--gray-400); color: var(--gray-800);
    }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(16,14,10,0.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
      animation: overlayIn 0.2s ease;
      padding: 24px;
    }
    @keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      background: var(--white);
      border-radius: var(--radius-xl);
      padding: 36px;
      width: 100%; max-width: 500px;
      max-height: 90vh; overflow-y: auto;
      box-shadow: var(--shadow-lg);
      animation: modalIn 0.24s ease;
    }
    @keyframes modalIn {
      from { transform: scale(0.96) translateY(12px); opacity: 0; }
      to { transform: scale(1) translateY(0); opacity: 1; }
    }
    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 22px; font-weight: 700;
      color: var(--black); margin-bottom: 24px;
    }
    .modal-footer {
      display: flex; gap: 10px; justify-content: flex-end;
      margin-top: 24px; padding-top: 20px;
      border-top: 1px solid var(--gray-100);
    }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 28px; right: 28px;
      background: var(--black); color: white;
      padding: 13px 20px;
      border-radius: var(--radius-lg);
      font-size: 13.5px; font-weight: 500;
      box-shadow: var(--shadow-lg);
      z-index: 9999;
      animation: toastIn 0.28s ease;
      max-width: 320px; line-height: 1.4;
    }
    .toast.success { background: var(--success); }
    .toast.error { background: var(--danger); }
    .toast.info { background: var(--orange); }

function showToast(msg, type = 'info') {
  const ex = document.querySelector('.toast');
  if (ex) ex.remove();
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; t.style.transition='opacity 0.4s'; setTimeout(()=>t.remove(),400); }, 2800);
}

function showModal(title, bodyHTML, onConfirm, confirmLabel='Confirm', confirmClass='btn-primary') {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-title">${title}</div>
      <div id="modal-body">${bodyHTML}</div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="modal-cancel">Cancel</button>
        <button class="btn ${confirmClass}" id="modal-confirm">${confirmLabel}</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('#modal-cancel').onclick = () => overlay.remove();
  overlay.querySelector('#modal-confirm').onclick = () => { if(onConfirm(overlay)) overlay.remove(); };
  overlay.onclick = (e) => { if(e.target===overlay) overlay.remove(); };
}

function getBadge(status) {
  const map = {
    assigned:'badge-assigned', ongoing:'badge-ongoing',
    completed:'badge-completed', incomplete:'badge-incomplete',
    pending:'badge-pending', approved:'badge-approved', rejected:'badge-rejected',
    admin:'badge-admin', manager:'badge-manager', sp:'badge-sp',
    expense:'badge-expense', followup:'badge-followup', leave:'badge-leave',
  };
  const label = status.charAt(0).toUpperCase()+status.slice(1);
  return `<span class="badge ${map[status]||''}">${label}</span>`;
}

function getInitials(name) {
  return name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
}

function formatDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
}

function emptyState(text, sub='') {
  return `<div class="empty-state">

}

function attachAdminEvents() {
  window.deleteUser = (id) => {

    showModal('Remove User','<p style="color:var(--gray-600);font-size:14px">Are you sure you want to remove this user? This action cannot be undone.</p>',

      'Remove','btn-danger');
  };

  window.showAddUserModal = () => {
    const managers = STATE.users.filter(u=>u.role==='manager');
    const mgrOptions = managers.map(m=>`<option value="${m.id}">${m.name}</option>`).join('');
    showModal('Add New User', `

      <div class="form-group"><label class="form-label">Email Address</label><input class="form-input" id="nu-email" type="email" placeholder="email@example.com"/></div>
      <div class="form-group"><label class="form-label">Password</label><input class="form-input" id="nu-pass" type="password" placeholder="Set a password"/></div>
      <div class="grid-2">
        <div class="form-group"><label class="form-label">Role</label>
          <select class="form-select" id="nu-role" onchange="toggleManagerField()">
            <option value="sp">Salesperson</option><option value="manager">Manager</option>
          </select></div>
        <div class="form-group"><label class="form-label">Zone</label><input class="form-input" id="nu-zone" placeholder="e.g. South, North"/></div>
      </div>
      <div class="form-group" id="nu-mgr-wrap"><label class="form-label">Reporting Manager</label>
        <select class="form-select" id="nu-manager">${mgrOptions}</select></div>`,
      (overlay) => {
        const name=overlay.querySelector('#nu-name').value.trim(),
          email=overlay.querySelector('#nu-email').value.trim(),
          pass=overlay.querySelector('#nu-pass').value.trim(),
          role=overlay.querySelector('#nu-role').value,
          zone=overlay.querySelector('#nu-zone').value.trim(),
          mgrId=parseInt(overlay.querySelector('#nu-manager')?.value);
        if (!name||!email||!pass||!zone) { showToast('Please fill all required fields','error'); return false; }
        const newId=Math.max(...STATE.users.map(u=>u.id))+1;
        const user={id:newId,name,email,password:pass,role,zone,performance:70};
        if (role==='sp'&&mgrId) {
          user.managerId=mgrId;
          const mgr=STATE.getUserById(mgrId);
          if (mgr) { mgr.team=mgr.team||[]; mgr.team.push(newId); }

        STATE.users.push(user);
        showToast(`${name} has been added`,'success');
        renderAdminDashboard(); return true;

    window.toggleManagerField = () => {

  };

function attachManagerEvents() {
  window.assignTask = () => {
    const title=document.getElementById('t-title')?.value.trim(),
      desc=document.getElementById('t-desc')?.value.trim(),
      spId=parseInt(document.getElementById('t-sp')?.value),
      loc=document.getElementById('t-loc')?.value.trim(),
      expense=parseInt(document.getElementById('t-expense')?.value)||0,
      date=document.getElementById('t-date')?.value,
      time=document.getElementById('t-time')?.value;
    if (!title||!spId||!loc||!date) { showToast('Please fill all required fields','error'); return; }
    const task={id:STATE.nextTaskId++,title,description:desc,assignedTo:spId,assignedBy:STATE.currentUser.id,location:loc,deadline:date,time,allowedExpense:expense,status:'assigned',proof:'',createdAt:new Date().toISOString().split('T')[0]};
    STATE.tasks.push(task);
    const sp=STATE.getUserById(spId);
    showToast(`Task assigned to ${sp?sp.name:'team member'}`,'success');
    managerSection='tasks'; renderManagerDashboard();
  };

  window.setTaskFilter=(f)=>{taskFilter=f;renderManagerDashboard();};

  window.deleteTask=(id)=>{
    showModal('Delete Task','<p style="color:var(--gray-600);font-size:14px">Are you sure you want to permanently delete this task? This action cannot be undone.</p>',
      ()=>{STATE.tasks=STATE.tasks.filter(t=>t.id!==id);showToast('Task deleted','success');renderManagerDashboard();return true;},
      'Delete','btn-danger');
  };

  window.handleRequest=(reqId,action)=>{
    showModal(
      action==='approved'?'Approve Request':'Reject Request',
      `<div class="form-group"><label class="form-label">Note (optional)</label><textarea class="textarea" id="req-note" placeholder="Add a note for the salesperson..."></textarea></div>`,
      (overlay)=>{
        const note=overlay.querySelector('#req-note').value.trim();
        const req=STATE.requests.find(r=>r.id===reqId);
        if (req) { req.status=action; req.managerNote=note||(action==='approved'?'Approved.':'Rejected.'); }
        showToast(`Request ${action}`,'success');
        renderManagerDashboard(); return true;
      },
      action==='approved'?'Approve':'Reject',
      action==='approved'?'btn-success':'btn-danger'
    );
  };
}

            <div class="task-name">${t.title}</div>
            <div class="task-meta">
              <span class="task-meta-item">${ICONS.user} ${mgr?mgr.name:'—'}</span>
              <span class="task-meta-item">${ICONS.pin} ${t.location}</span>
              <span class="task-meta-item">${ICONS.calendar} ${formatDate(t.deadline)}${t.time?' at '+t.time:''}</span>
              <span class="task-meta-item">${ICONS.money} Rs.${t.allowedExpense} budget</span>
            </div>
            ${t.description?`<div style="margin-top:10px;font-size:13px;color:var(--gray-600);line-height:1.5">${t.description}</div>`:''}
          </div>
          <div style="flex-shrink:0;margin-left:12px">${getBadge(t.status)}</div>
        </div>
        ${t.proof?`<div class="task-note"><div class="task-note-label">Your Completion Note</div>${t.proof}</div>`:''}
        <div class="task-actions">${actions}</div>
      </div>`;
  }).join('');

  return `
    <div class="topbar">
      <div><div class="page-title">My Tasks</div><div class="page-sub">${all.length} task${all.length!==1?'s':''} assigned to you</div></div>
    </div>
    <div class="filter-bar">${filterBtns}</div>
    <div id="sp-task-list">${cards||emptyState('No tasks here','Your manager will assign field tasks soon')}</div>`;
}

function spRequestsHTML() {
  const user=STATE.currentUser, reqs=STATE.getRequestsByUser(user.id);
  const cards=reqs.map(r=>{
    const task=STATE.tasks.find(t=>t.id===r.taskId);
    return `
      <div class="task-card">
        <div class="task-card-header">
          <div>
            <div class="task-name">${r.title}</div>
            <div class="task-meta">
              <span class="task-meta-item">${ICONS.tasks} ${task?task.title:'—'}</span>
              ${r.amount?`<span class="task-meta-item">${ICONS.money} Rs.${r.amount}</span>`:''}
            </div>
            <div style="margin-top:10px;font-size:13px;color:var(--gray-600);line-height:1.5">${r.description}</div>
          </div>
          <div style="flex-shrink:0">${getBadge(r.status)} <span style="margin-left:6px">${getBadge(r.type)}</span></div>
        </div>
        ${r.managerNote?`<div class="task-note"><div class="task-note-label">Manager Response</div>${r.managerNote}</div>`:''}
      </div>`;
  }).join('');

  return `
    <div class="topbar">
      <div><div class="page-title">My Requests</div><div class="page-sub">Expense and follow-up requests you have raised</div></div>
    </div>
    ${cards||emptyState('No requests raised','Raise expense or follow-up requests from your ongoing tasks')}`;
}

function spPerformanceHTML() {
  const user=STATE.currentUser, tasks=STATE.getTasksByUser(user.id);
  const done=tasks.filter(t=>t.status==='completed').length,
    ongoing=tasks.filter(t=>t.status==='ongoing').length,
    incomplete=tasks.filter(t=>t.status==='incomplete').length,
    perf=user.performance||0;

  return `
    <div class="topbar">
      <div><div class="page-title">My Performance</div><div class="page-sub">Field activity metrics and scoring</div></div>
    </div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-card-label">Total Tasks</div><div class="stat-card-value">${tasks.length}</div></div>
      <div class="stat-card"><div class="stat-card-label">Completed</div><div class="stat-card-value accent">${done}</div></div>
      <div class="stat-card"><div class="stat-card-label">Ongoing</div><div class="stat-card-value">${ongoing}</div></div>
      <div class="stat-card"><div class="stat-card-label">Incomplete</div><div class="stat-card-value">${incomplete}</div></div>
    </div>
    <div class="card" style="max-width:480px">
      <div class="card-title">Overall Performance Score</div>
      <div class="perf-score" style="font-size:64px;margin:16px 0 6px">${perf}%</div>
      <div class="perf-bar" style="height:12px;border-radius:20px;margin-bottom:16px"><div class="perf-bar-fill" style="width:${perf}%"></div></div>
      <div class="text-sm text-gray">Score based on task completion rate and manager feedback. Completing tasks increases your score.</div>
    </div>`;
}

function spProfileHTML() {
  const user=STATE.currentUser, mgr=STATE.getUserById(user.managerId);
  return `
    <div class="topbar"><div><div class="page-title">My Profile</div></div></div>
    <div class="card" style="max-width:480px">
      <div class="flex-row gap-8 mb-20">
        <div style="width:56px;height:56px;border-radius:14px;background:var(--orange);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:white;font-family:'Playfair Display',serif;flex-shrink:0">${getInitials(user.name)}</div>
        <div>
          <div style="font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--black)">${user.name}</div>
          <div class="text-gray text-sm">${user.email}</div>
        </div>
      </div>
      <div class="divider"></div>
      <table class="info-table">
        <tr><td class="label">Role</td><td class="value">${getBadge('sp')}</td></tr>
        <tr><td class="label">Zone</td><td class="value">${user.zone}</td></tr>
        <tr><td class="label">Reporting Manager</td><td class="value">${mgr?mgr.name:'—'}</td></tr>
        <tr><td class="label">Performance Score</td><td class="value text-orange">${user.performance||0}%</td></tr>
      </table>
    </div>`;
}

function attachSPEvents() {
  window.spSetFilter=(f)=>{spTaskFilter=f;renderSPDashboard();};

  window.updateTaskStatus=(taskId,status)=>{
    const task=STATE.tasks.find(t=>t.id===taskId);
    if (task) task.status=status;
    showToast(`Task marked as ${status}`,'success');
    renderSPDashboard();
  };

  window.showCompleteModal=(taskId)=>{
    showModal('Complete Task',
      `<div class="form-group"><label class="form-label">Completion Note</label><textarea class="textarea" id="proof-note" placeholder="Describe what you accomplished, who you met, and the outcome of this visit..."></textarea></div>`,
      (overlay)=>{
        const proof=overlay.querySelector('#proof-note').value.trim();
        if (!proof) { showToast('Please add a completion note','error'); return false; }
        const task=STATE.tasks.find(t=>t.id===taskId);
        if (task) { task.status='completed'; task.proof=proof; }
        if (STATE.currentUser.performance<100) STATE.currentUser.performance=Math.min(100,(STATE.currentUser.performance||0)+5);
        showToast('Task marked complete. Well done.','success');
        renderSPDashboard(); return true;
      },'Submit','btn-success');
  };

  window.showRaiseRequestModal=(taskId)=>{
    showModal('Raise Request',`
      <div class="form-group"><label class="form-label">Request Type</label>
        <select class="form-select" id="req-type">
          <option value="expense">Expense Reimbursement</option>
          <option value="followup">Follow-up Visit</option>
          <option value="leave">Leave</option>
        </select></div>
      <div class="form-group"><label class="form-label">Title</label><input class="form-input" id="req-title" placeholder="e.g. Extra travel expense"/></div>
      <div class="form-group"><label class="form-label">Description</label><textarea class="textarea" id="req-desc" placeholder="Explain your request in detail..."></textarea></div>
      <div class="form-group"><label class="form-label">Amount (Rs.) — if expense</label><input class="form-input" type="number" id="req-amount" placeholder="0"/></div>`,
      (overlay)=>{
        const type=overlay.querySelector('#req-type').value,
          title=overlay.querySelector('#req-title').value.trim(),
          desc=overlay.querySelector('#req-desc').value.trim(),
          amount=parseInt(overlay.querySelector('#req-amount').value)||0;
        if (!title||!desc) { showToast('Please fill all required fields','error'); return false; }
        STATE.requests.push({id:STATE.nextRequestId++,type,title,description:desc,amount,raisedBy:STATE.currentUser.id,managerId:STATE.currentUser.managerId,taskId,status:'pending',managerNote:'',createdAt:new Date().toISOString().split('T')[0]});
        showToast('Request submitted. Your manager will review it.','info');
        spSection='requests'; renderSPDashboard(); return true;
      },'Submit Request');
  };
}

// Boot
renderLogin();
</script>
</body>
</html>
