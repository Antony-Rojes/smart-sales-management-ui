<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FieldForce — Sales Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand: #1A73E8;
      --brand-dark: #1557B0;
      --brand-light: #E8F0FE;
      --brand-mid: #4285F4;
      --accent: #FF6D00;
      --accent-light: #FFF3E0;
      --accent-dark: #E65100;
      --success: #188038;
      --success-light: #E6F4EA;
      --danger: #C5221F;
      --danger-light: #FCE8E6;
      --warning: #B06000;
      --warning-light: #FEF7E0;
      --info: #1A73E8;
      --info-light: #E8F0FE;
      --purple: #6200EE;
      --purple-light: #F3E8FF;

      --white: #FFFFFF;
      --surface: #F8F9FA;
      --surface-2: #F1F3F4;
      --border: #DADCE0;
      --border-light: #E8EAED;
      --text-primary: #202124;
      --text-secondary: #5F6368;
      --text-muted: #80868B;
      --text-link: #1A73E8;

      --shadow-1: 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15);
      --shadow-2: 0 1px 2px 0 rgba(60,64,67,0.3), 0 2px 6px 2px rgba(60,64,67,0.15);
      --shadow-3: 0 4px 8px 3px rgba(60,64,67,0.15), 0 1px 3px rgba(60,64,67,0.3);

      --sidebar-w: 256px;
      --header-h: 64px;
      --radius-sm: 4px;
      --radius: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', 'Google Sans', sans-serif;
      background: var(--surface);
      color: var(--text-primary);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── LOGIN ─── */
    .login-wrap {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 420px 1fr;
    }

    .login-panel {
      background: var(--white);
      display: flex;
      flex-direction: column;
      padding: 0;
      border-right: 1px solid var(--border);
      box-shadow: var(--shadow-2);
      z-index: 1;
    }

    .login-panel-inner {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 56px 48px;
    }

    .login-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 40px;
    }
    .login-logo-mark {
      width: 40px; height: 40px;
      background: var(--brand);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .login-logo-mark svg { width: 20px; height: 20px; color: white; }
    .login-logo-name {
      font-family: 'Google Sans', 'DM Sans', sans-serif;
      font-size: 20px; font-weight: 700;
      color: var(--text-primary); letter-spacing: -0.3px;
    }
    .login-logo-name span { color: var(--brand); }

    .login-heading {
      font-family: 'Google Sans', 'DM Sans', sans-serif;
      font-size: 26px; font-weight: 600;
      color: var(--text-primary); margin-bottom: 6px;
    }
    .login-sub { font-size: 14px; color: var(--text-secondary); margin-bottom: 32px; }

    .role-tabs {
      display: flex;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 24px;
      overflow: hidden;
      background: var(--surface-2);
    }
    .role-tab {
      flex: 1; padding: 9px 6px;
      border: none; background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
    }
    .role-tab.active {
      background: var(--brand);
      color: white; font-weight: 600;
      border-radius: calc(var(--radius) - 1px);
      margin: 2px;
    }

    .form-row { margin-bottom: 16px; }
    .form-label {
      display: block; font-size: 12px; font-weight: 600;
      color: var(--text-secondary); margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: 0.6px;
    }
    .form-input, .form-select, .form-textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; color: var(--text-primary);
      background: var(--white);
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 2px rgba(26,115,232,0.2);
    }
    .form-select {
      cursor: pointer; appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%235F6368' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat; background-position: right 12px center;
      padding-right: 32px;
    }
    .form-textarea { resize: vertical; min-height: 90px; line-height: 1.6; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 9px 18px;
      border: none; border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 13.5px; font-weight: 600;
      cursor: pointer; transition: all 0.15s;
      text-decoration: none; white-space: nowrap; letter-spacing: 0.1px;
    }
    .btn-brand { background: var(--brand); color: white; }
    .btn-brand:hover { background: var(--brand-dark); box-shadow: var(--shadow-1); }
    .btn-brand-full { width: 100%; padding: 12px; font-size: 14.5px; border-radius: var(--radius); margin-top: 4px; }
    .btn-outlined { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
    .btn-outlined:hover { background: var(--surface-2); border-color: var(--text-secondary); }
    .btn-ghost { background: transparent; color: var(--text-secondary); }
    .btn-ghost:hover { background: var(--surface-2); color: var(--text-primary); }
    .btn-success { background: var(--success); color: white; }
    .btn-success:hover { opacity: 0.88; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-danger:hover { opacity: 0.88; }
    .btn-accent { background: var(--accent); color: white; }
    .btn-accent:hover { background: var(--accent-dark); }
    .btn-sm { padding: 5px 12px; font-size: 12.5px; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }

    .creds-box {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-top: 20px;
    }
    .creds-label {
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px;
      color: var(--text-muted); margin-bottom: 10px;
    }
    .cred-row { padding: 5px 0; border-bottom: 1px solid var(--border-light); }
    .cred-row:last-child { border-bottom: none; padding-bottom: 0; }
    .cred-name { font-size: 12.5px; font-weight: 600; color: var(--text-primary); }
    .cred-info { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-secondary); margin-top: 1px; }

    .login-hero {
      background: linear-gradient(135deg, #1A73E8 0%, #0D47A1 100%);
      display: flex; flex-direction: column;
      justify-content: center; align-items: flex-start;
      padding: 80px 72px;
      position: relative; overflow: hidden;
    }
    .login-hero::before {
      content: '';
      position: absolute; inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .hero-content { position: relative; z-index: 1; }
    .hero-tag {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 12px; font-weight: 600; color: white;
      margin-bottom: 28px; letter-spacing: 0.3px;
    }
    .hero-headline {
      font-family: 'Google Sans', 'DM Sans', sans-serif;
      font-size: 44px; font-weight: 700;
      color: white; line-height: 1.12;
      letter-spacing: -0.5px; margin-bottom: 20px;
    }
    .hero-sub { font-size: 15px; color: rgba(255,255,255,0.78); line-height: 1.65; max-width: 420px; margin-bottom: 48px; }
    .hero-stats {
      display: flex; gap: 32px;
    }
    .hero-stat-val {
      font-family: 'Google Sans', sans-serif;
      font-size: 28px; font-weight: 700; color: white;
    }
    .hero-stat-lbl { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }

    /* ─── LAYOUT ─── */
    .app-shell { display: flex; min-height: 100vh; }

    .sidebar {
      width: var(--sidebar-w);
      background: var(--white);
      border-right: 1px solid var(--border);
      position: fixed; top: 0; left: 0; bottom: 0;
      display: flex; flex-direction: column;
      z-index: 100;
    }
    .sidebar-top {
      padding: 20px 16px 16px;
      border-bottom: 1px solid var(--border-light);
    }
    .sidebar-brand {
      display: flex; align-items: center; gap: 10px;
    }
    .sidebar-brand-mark {
      width: 34px; height: 34px;
      background: var(--brand);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .sidebar-brand-mark svg { width: 18px; height: 18px; color: white; }
    .sidebar-brand-name {
      font-family: 'Google Sans', sans-serif;
      font-size: 17px; font-weight: 700;
      color: var(--text-primary);
    }
    .sidebar-brand-name span { color: var(--brand); }

    .sidebar-nav {
      flex: 1; padding: 8px 8px;
      overflow-y: auto;
    }
    .nav-section-label {
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px;
      color: var(--text-muted);
      padding: 12px 8px 6px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 12px;
      border-radius: var(--radius);
      cursor: pointer; font-size: 13.5px; font-weight: 500;
      color: var(--text-secondary);
      border: none; background: transparent;
      width: 100%; text-align: left;
      transition: all 0.12s; margin-bottom: 1px;
      position: relative;
    }
    .nav-item:hover { background: var(--surface-2); color: var(--text-primary); }
    .nav-item.active {
      background: var(--brand-light);
      color: var(--brand); font-weight: 600;
    }
    .nav-item.active .nav-icon { color: var(--brand); }
    .nav-icon { width: 18px; height: 18px; flex-shrink: 0; display: flex; align-items: center; }
    .nav-icon svg { width: 16px; height: 16px; }
    .nav-badge {
      margin-left: auto;
      background: var(--brand);
      color: white; font-size: 10px; font-weight: 700;
      padding: 2px 7px; border-radius: 10px; min-width: 20px; text-align: center;
    }

    .sidebar-bottom {
      padding: 12px 12px 16px;
      border-top: 1px solid var(--border-light);
    }
    .sidebar-user {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 8px; border-radius: var(--radius);
      margin-bottom: 8px;
    }
    .user-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--brand); color: white;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Google Sans', sans-serif;
      font-size: 13px; font-weight: 700; flex-shrink: 0;
    }
    .user-name { font-size: 13px; font-weight: 600; color: var(--text-primary); line-height: 1.2; }
    .user-role { font-size: 11px; color: var(--text-muted); }
    .signout-btn {
      width: 100%; padding: 9px;
      background: transparent; border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 12.5px; font-weight: 600;
      color: var(--text-secondary); cursor: pointer; transition: all 0.15s;
    }
    .signout-btn:hover { background: var(--danger-light); border-color: var(--danger); color: var(--danger); }

    /* ─── MAIN ─── */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
    }

    .topbar {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: var(--header-h);
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
    }
    .page-heading { font-family: 'Google Sans', sans-serif; font-size: 18px; font-weight: 600; color: var(--text-primary); }
    .page-sub { font-size: 12.5px; color: var(--text-muted); margin-top: 1px; }
    .topbar-actions { display: flex; align-items: center; gap: 10px; }

    .page-body { padding: 28px 32px; flex: 1; }

    /* ─── STATS ─── */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px; margin-bottom: 28px;
    }
    .kpi-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px 22px;
      transition: box-shadow 0.15s;
    }
    .kpi-card:hover { box-shadow: var(--shadow-1); }
    .kpi-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.7px; color: var(--text-muted); margin-bottom: 10px; }
    .kpi-value {
      font-family: 'Google Sans', sans-serif;
      font-size: 32px; font-weight: 700;
      color: var(--text-primary); line-height: 1;
    }
    .kpi-value.brand { color: var(--brand); }
    .kpi-value.success { color: var(--success); }
    .kpi-value.danger { color: var(--danger); }
    .kpi-value.accent { color: var(--accent); }

    /* ─── CARD ─── */
    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      margin-bottom: 20px;
    }
    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-light);
    }
    .card-title { font-family: 'Google Sans', sans-serif; font-size: 14.5px; font-weight: 600; color: var(--text-primary); }
    .card-body { padding: 20px; }
    .card-body-flush { padding: 0; }

    /* ─── TABLES ─── */
    .data-table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
    .data-table thead th {
      text-align: left; padding: 10px 16px;
      background: var(--surface-2);
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.7px;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    .data-table thead th:first-child { border-radius: var(--radius) 0 0 0; }
    .data-table thead th:last-child { border-radius: 0 var(--radius) 0 0; }
    .data-table tbody td {
      padding: 13px 16px;
      border-bottom: 1px solid var(--border-light);
      color: var(--text-primary); vertical-align: middle;
    }
    .data-table tbody tr:last-child td { border-bottom: none; }
    .data-table tbody tr { transition: background 0.1s; }
    .data-table tbody tr:hover { background: var(--surface); }
    .data-table .col-strong { font-weight: 600; color: var(--text-primary); }
    .data-table .col-muted { color: var(--text-secondary); }
    .data-table .col-mono { font-family: 'DM Mono', monospace; font-size: 12.5px; }

    /* ─── BADGES ─── */
    .chip {
      display: inline-flex; align-items: center;
      padding: 3px 10px; border-radius: 20px;
      font-size: 11.5px; font-weight: 600; letter-spacing: 0.2px;
    }
    .chip-assigned { background: var(--info-light); color: var(--brand); }
    .chip-ongoing { background: var(--accent-light); color: var(--accent-dark); }
    .chip-completed { background: var(--success-light); color: var(--success); }
    .chip-incomplete { background: var(--danger-light); color: var(--danger); }
    .chip-pending { background: var(--warning-light); color: var(--warning); }
    .chip-approved { background: var(--success-light); color: var(--success); }
    .chip-rejected { background: var(--danger-light); color: var(--danger); }
    .chip-admin { background: #EDE7F6; color: #512DA8; }
    .chip-manager { background: var(--info-light); color: var(--brand); }
    .chip-sp { background: var(--success-light); color: var(--success); }
    .chip-expense { background: var(--warning-light); color: var(--warning); }
    .chip-followup { background: var(--info-light); color: var(--brand); }
    .chip-leave { background: var(--surface-2); color: var(--text-secondary); border: 1px solid var(--border); }
    .chip-analysis { background: var(--purple-light); color: var(--purple); }

    /* ─── FILTER BAR ─── */
    .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
    .filter-pill {
      padding: 6px 16px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 12.5px; font-weight: 500;
      cursor: pointer; color: var(--text-secondary); transition: all 0.12s;
    }
    .filter-pill.active { border-color: var(--brand); color: var(--brand); background: var(--brand-light); font-weight: 600; }
    .filter-pill:hover:not(.active) { border-color: var(--text-secondary); color: var(--text-primary); background: var(--surface-2); }

    /* ─── TASK CARD ─── */
    .task-item {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 0;
      margin-bottom: 12px;
      transition: box-shadow 0.15s;
      overflow: hidden;
      animation: fadeSlideUp 0.25s ease;
    }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .task-item:hover { box-shadow: var(--shadow-1); }
    .task-item-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      padding: 18px 20px 14px; gap: 16px;
    }
    .task-item-title {
      font-family: 'Google Sans', sans-serif;
      font-size: 15px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px;
    }
    .task-meta-row {
      display: flex; flex-wrap: wrap; gap: 0; margin-top: 8px;
    }
    .task-meta-cell {
      display: flex; align-items: center; gap: 5px;
      font-size: 12.5px; color: var(--text-secondary);
      padding: 4px 12px 4px 0;
    }
    .task-meta-cell svg { width: 13px; height: 13px; color: var(--text-muted); flex-shrink: 0; }
    .task-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.55; margin-top: 8px; }
    .task-note {
      background: var(--surface-2);
      border-top: 1px solid var(--border-light);
      padding: 12px 20px;
      font-size: 13px; color: var(--text-primary); line-height: 1.55;
    }
    .task-note-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; color: var(--brand); margin-bottom: 3px; }
    .task-footer {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      padding: 10px 20px;
      border-top: 1px solid var(--border-light);
      background: var(--surface);
    }

    /* ─── ANALYSIS CARD ─── */
    .analysis-block {
      border-top: 1px solid var(--border-light);
      padding: 16px 20px;
      background: #FAFAFA;
    }
    .analysis-block-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px;
      color: var(--purple); margin-bottom: 14px;
      display: flex; align-items: center; gap: 6px;
    }
    .analysis-block-title svg { width: 14px; height: 14px; }
    .analysis-metrics-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .analysis-metrics-table th {
      text-align: left; padding: 7px 12px;
      background: var(--white); border: 1px solid var(--border);
      font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-muted);
    }
    .analysis-metrics-table td {
      padding: 9px 12px; border: 1px solid var(--border-light);
      background: var(--white); vertical-align: middle;
    }
    .analysis-metrics-table td.val {
      font-family: 'Google Sans', sans-serif; font-weight: 700; font-size: 15px;
    }
    .analysis-metrics-table td.val.good { color: var(--success); }
    .analysis-metrics-table td.val.warn { color: var(--warning); }
    .analysis-metrics-table td.val.accent { color: var(--accent); }
    .analysis-summary-box {
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 12px 14px;
      font-size: 13px; color: var(--text-secondary); line-height: 1.6;
      margin-top: 12px;
    }
    .analysis-summary-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-muted); margin-bottom: 5px; }

      z-index: 1000; padding: 24px;
      animation: overlayIn 0.18s ease;

    @keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      background: var(--white);
      border-radius: var(--radius-xl);
      width: 100%; max-width: 500px;
      max-height: 90vh; overflow-y: auto;
      box-shadow: var(--shadow-3);
      animation: modalSlide 0.2s ease;
    }
    .modal-wide { max-width: 680px; }
    @keyframes modalSlide {
      from { transform: translateY(16px) scale(0.98); opacity: 0; }
      to { transform: translateY(0) scale(1); opacity: 1; }
    }
    .modal-header { padding: 24px 28px 0; }
    .modal-title { font-family: 'Google Sans', sans-serif; font-size: 18px; font-weight: 600; color: var(--text-primary); margin-bottom: 20px; }
    .modal-body { padding: 0 28px; }
    .modal-footer {
      display: flex; gap: 10px; justify-content: flex-end;
      padding: 20px 28px 24px;
      border-top: 1px solid var(--border-light);
      margin-top: 20px;
    }

    /* ─── TOAST ─── */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--text-primary); color: white;
      padding: 12px 22px; border-radius: var(--radius-lg);
      font-size: 13.5px; font-weight: 500;
      box-shadow: var(--shadow-3); z-index: 9999;
      animation: toastIn 0.25s ease; white-space: nowrap;
    }
    .toast.success { background: var(--success); }
    .toast.error { background: var(--danger); }
    .toast.info { background: var(--brand); }
    @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(12px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

    /* ─── AVATAR ─── */
    .avatar {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--brand); color: white;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; font-family: 'Google Sans', sans-serif; flex-shrink: 0;
    }

    /* ─── EMPTY STATE ─── */
    .empty-box { text-align: center; padding: 56px 24px; }
    .empty-icon {
      width: 48px; height: 48px; background: var(--surface-2);
      border-radius: 12px; display: flex; align-items: center; justify-content: center;

    .audio-drop-icon {
      width: 40px; height: 40px; background: var(--brand-light);
      border-radius: 10px; display: flex; align-items: center; justify-content: center;
      margin: 0 auto 10px;

    .audio-drop-icon svg { width: 20px; height: 20px; color: var(--brand); }
    .audio-drop-text { font-size: 13.5px; font-weight: 600; color: var(--text-primary); }
    .audio-drop-sub { font-size: 12px; color: var(--text-muted); margin-top: 3px; }

    .clip-list-label { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; color: var(--text-muted); margin-bottom: 8px; }
    .audio-clip {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px; border: 1px solid var(--border);
      border-radius: var(--radius); margin-bottom: 6px;
      cursor: pointer; transition: all 0.12s;

    .audio-clip.selected { border-color: var(--brand); background: var(--brand-light); }
    .audio-clip-icon {

    /* ─── ANALYSIS REPORT MODAL ─── */
    .analysis-report {
      background: var(--surface);

    .pulse-dot {

    .sp-status-dot.active { background: var(--success); }

    /* ─── GRID HELPERS ─── */

    .mt-4 { margin-top: 4px; }

    .text-muted { color: var(--text-muted); }

function showToast(msg, type='info') {
  const ex=document.querySelector('.toast'); if(ex) ex.remove();
  const t=document.createElement('div'); t.className=`toast ${type}`; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity 0.4s';setTimeout(()=>t.remove(),400);},2800);
}

function showModal(title, bodyHTML, onConfirm, confirmLabel='Confirm', confirmClass='btn-brand', wide=false) {
  const ov=document.createElement('div'); ov.className='modal-overlay';
  ov.innerHTML=`<div class="modal ${wide?'modal-wide':''}">
    <div class="modal-header"><div class="modal-title">${title}</div></div>
    <div class="modal-body">${bodyHTML}</div>
    <div class="modal-footer">
      <button class="btn btn-outlined" id="mc">Cancel</button>
      <button class="btn ${confirmClass}" id="mok">${confirmLabel}</button>
    </div></div>`;
  document.body.appendChild(ov);
  ov.querySelector('#mc').onclick=()=>ov.remove();
  ov.querySelector('#mok').onclick=()=>{ if(onConfirm(ov)) ov.remove(); };
  ov.onclick=(e)=>{ if(e.target===ov) ov.remove(); };
}

function chip(status) {
  const map={assigned:'chip-assigned',ongoing:'chip-ongoing',completed:'chip-completed',incomplete:'chip-incomplete',
    pending:'chip-pending',approved:'chip-approved',rejected:'chip-rejected',
    admin:'chip-admin',manager:'chip-manager',sp:'chip-sp',
    expense:'chip-expense',followup:'chip-followup',leave:'chip-leave',analysis:'chip-analysis'};
  const labels={sp:'Sales Rep',followup:'Follow-up'};
  const label=labels[status]||(status.charAt(0).toUpperCase()+status.slice(1));
  return `<span class="chip ${map[status]||''}">${label}</span>`;
}

function initials(name) { return name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(); }

function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
}

function emptyState(text,sub='') {
  return `<div class="empty-box"><div class="empty-icon">${IC.info}</div>
    <div class="empty-text">${text}</div>${sub?`<div class="empty-sub">${sub}</div>`:''}</div>`;
}

function buildShell(user, navItems, activeId, content, topbarRight='', subtitle='') {
  const roleLabel=user.role==='sp'?'Salesperson':user.role.charAt(0).toUpperCase()+user.role.slice(1);
  const nav=navItems.map(n=>`
    <button class="nav-item ${activeId===n.id?'active':''}" onclick="navigate('${n.id}')">

      <span>${n.label}</span>
      ${n.badge?`<span class="nav-badge">${n.badge}</span>`:''}
    </button>`).join('');
  const activeNav=navItems.find(n=>n.id===activeId);
  const pageTitle=activeNav?activeNav.label:user.role.charAt(0).toUpperCase()+user.role.slice(1)+' Dashboard';
  return `<div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="sidebar-brand">
          <div class="sidebar-brand-mark">${IC.logo}</div>
          <div class="sidebar-brand-name">Field<span>Force</span></div>

function attachManagerEvents(){
  window.assignTask=()=>{
    const title=document.getElementById('t-title')?.value.trim(),
      desc=document.getElementById('t-desc')?.value.trim(),
      spId=parseInt(document.getElementById('t-sp')?.value),
      loc=document.getElementById('t-loc')?.value.trim(),
      expense=parseInt(document.getElementById('t-expense')?.value)||0,
      date=document.getElementById('t-date')?.value,
      time=document.getElementById('t-time')?.value;
    if(!title||!spId||!loc||!date){showToast('Please fill all required fields','error');return;}
    const task={id:STATE.nextTaskId++,title,description:desc,assignedTo:spId,assignedBy:STATE.currentUser.id,location:loc,deadline:date,time,allowedExpense:expense,status:'assigned',proof:'',createdAt:new Date().toISOString().split('T')[0],analysis:null};
    STATE.tasks.push(task);
    const sp=STATE.getUserById(spId);
    showToast(`Task assigned to ${sp?sp.name:'team member'}`,'success');
    managerSection='tasks';renderManager();
  };
  window.setTaskFilter=(f)=>{taskFilter=f;renderManager();};
  window.deleteTask=(id)=>{
    showModal('Delete Task','<p style="color:var(--text-secondary);font-size:14px;padding:4px 0">This action cannot be undone.</p>',
      ()=>{STATE.tasks=STATE.tasks.filter(t=>t.id!==id);showToast('Task deleted','success');renderManager();return true;},'Delete','btn-danger');
  };
  window.handleRequest=(reqId,action)=>{
    showModal(action==='approved'?'Approve Request':'Reject Request',
      `<div class="form-row"><label class="form-label">Note (optional)</label><textarea class="form-textarea" id="req-note" placeholder="Add a note for the salesperson..."></textarea></div>`,
      (ov)=>{
        const note=ov.querySelector('#req-note').value.trim();
        const req=STATE.requests.find(r=>r.id===reqId);
        if(req){req.status=action;req.managerNote=note||(action==='approved'?'Approved.':'Rejected.');}
        showToast(`Request ${action}`,'success');renderManager();return true;
      },action==='approved'?'Approve':'Reject',action==='approved'?'btn-success':'btn-danger');
  };
  window.selectSP=(id)=>{selectedSPId=id;renderManager();};
}

function buildTaskCard(t, viewerRole){
  const sp=STATE.getUserById(t.assignedTo),mgr=STATE.getUserById(t.assignedBy);
  const displayUser=viewerRole==='manager'?sp:mgr;
  const displayLabel=viewerRole==='manager'?'Sales Rep':'Manager';

  let actions='';
  if(viewerRole==='manager'){
    actions=`<button class="btn btn-danger btn-sm" onclick="deleteTask(${t.id})">Delete Task</button>`;
  } else {
    if(t.status==='assigned') actions=`<button class="btn btn-brand btn-sm" onclick="updateTaskStatus(${t.id},'ongoing')">Start Task</button>`;
    else if(t.status==='ongoing') actions=`
      <button class="btn btn-success btn-sm" onclick="showCompleteModal(${t.id})">Mark Complete</button>
      <button class="btn btn-danger btn-sm" onclick="updateTaskStatus(${t.id},'incomplete')">Mark Incomplete</button>
      <button class="btn btn-outlined btn-sm" onclick="showRaiseRequestModal(${t.id})">Raise Request</button>`;
    else if(t.status==='completed') actions=`<button class="btn btn-outlined btn-sm" onclick="showRaiseRequestModal(${t.id})">Raise Follow-up</button>`;
  }

  let analysisBlock='';
  if(t.analysis){
    const a=t.analysis,prob=a.dealClosingProbability;
    const probClass=prob>=70?'good':prob>=40?'warn':'';
    analysisBlock=`<div class="analysis-block">
      <div class="analysis-block-title">${IC.star} AI Call Analysis Report <span class="chip chip-analysis" style="font-size:10px;margin-left:4px">AI Generated</span></div>
      <table class="analysis-metrics-table">
        <thead><tr><th>Deal Probability</th><th>Follow-up Date</th><th>Engagement</th><th>Trial Units</th><th>Discount</th></tr></thead>
        <tbody><tr>
          <td class="val ${probClass}">${prob}%</td>
          <td>${fmtDate(a.followUpDate)}</td>
          <td class="val accent">${a.engagement}</td>
          <td>${a.trailUnits}</td>
          <td>${a.discount}</td>
        </tr></tbody>
      </table>
      ${a.summary?`<div class="analysis-summary-box"><div class="analysis-summary-label">Summary</div>${a.summary}</div>`:''}
    </div>`;
  }

  return `<div class="task-item">
    <div class="task-item-header">
      <div style="flex:1">
        <div class="task-item-title">${t.title}</div>
        <div class="task-meta-row">
          <span class="task-meta-cell">${IC.user} ${displayUser?displayUser.name:'—'}</span>
          <span class="task-meta-cell">${IC.pin} ${t.location}</span>
          <span class="task-meta-cell">${IC.calendar} ${fmtDate(t.deadline)}${t.time?' at '+t.time:''}</span>
          <span class="task-meta-cell">${IC.money} Rs.${t.allowedExpense} budget</span>
        </div>
        ${t.description?`<div class="task-desc">${t.description}</div>`:''}
      </div>
      <div style="flex-shrink:0;margin-left:16px">${chip(t.status)}</div>
    </div>
    ${t.proof?`<div class="task-note"><div class="task-note-label">Completion Note</div>${t.proof}</div>`:''}
    ${analysisBlock}
    ${actions?`<div class="task-footer">${actions}</div>`:''}
  </div>`;
}

    <div class="card-body-flush">
      <table class="data-table">
        <thead><tr><th>Task</th><th>Location</th><th>Deadline</th><th>Status</th></tr></thead>
        <tbody>${rows||`<tr><td colspan="4">${emptyState('No tasks')}</td></tr>`}</tbody>
      </table>
    </div>
  </div>`;
}

function spProfile(){
  const u=STATE.currentUser,mgr=STATE.getUserById(u.managerId);
  return `<div class="card" style="max-width:500px">
    <div class="card-header">
      <div class="flex-row gap-12">
        <div style="width:52px;height:52px;border-radius:50%;background:var(--brand);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:white;font-family:'Google Sans',sans-serif;flex-shrink:0">${initials(u.name)}</div>
        <div><div style="font-family:'Google Sans',sans-serif;font-size:18px;font-weight:700;color:var(--text-primary)">${u.name}</div><div class="col-mono text-muted text-sm">${u.email}</div></div>
      </div>
    </div>
    <div class="card-body-flush">
      <table class="data-table">
        <thead><tr><th>Field</th><th>Value</th></tr></thead>
        <tbody>
          <tr><td class="col-muted">Role</td><td>${chip('sp')}</td></tr>
          <tr><td class="col-muted">Zone</td><td class="col-strong">${u.zone}</td></tr>
          <tr><td class="col-muted">Reporting Manager</td><td class="col-strong">${mgr?mgr.name:'—'}</td></tr>
          <tr><td class="col-muted">Performance Score</td><td><span style="font-weight:700;color:var(--brand)">${u.performance||0}%</span></td></tr>
        </tbody>
      </table>
    </div>
  </div>`;
}

// ─────────────────────────────────────────
// WAVEFORM
// ─────────────────────────────────────────
function makeWaveform(seed,count=28){
  let h='';
  for(let i=0;i<count;i++){const ht=5+Math.abs(Math.sin(seed*i*0.7+i)*18);h+=`<span style="height:${ht}px"></span>`;}
  return h;
}

// ─────────────────────────────────────────
// SP EVENTS
// ─────────────────────────────────────────
function attachSPEvents(){
  window.spSetFilter=(f)=>{spTaskFilter=f;renderSP();};
  window.updateTaskStatus=(taskId,status)=>{
    const task=STATE.tasks.find(t=>t.id===taskId);
    if(task) task.status=status;
    showToast(`Task marked as ${status}`,'success');renderSP();
  };

  window.showCompleteModal=(taskId)=>{
    const defaultClip={name:'Call_Recording_Infosys.m4a',duration:'4:32',seed:3};
    const ov=document.createElement('div');ov.className='modal-overlay';
    ov.innerHTML=`<div class="modal modal-wide">
      <div class="modal-header"><div class="modal-title">Complete Task</div></div>
      <div class="modal-body">
        <div class="form-row">
          <label class="form-label">Completion Note</label>
          <textarea class="form-textarea" id="proof-note" placeholder="Describe what you accomplished, who you met, and the outcome..."></textarea>
        </div>
        <div class="form-row mb-0">
          <label class="form-label">Upload Call Recording</label>
          <div class="audio-drop-zone" onclick="document.getElementById('audio-file-input').click()">
            <div class="audio-drop-icon">${IC.audio}</div>
            <div class="audio-drop-text">Click to upload audio file</div>
            <div class="audio-drop-sub">Supports MP3, M4A, WAV, OGG</div>
            <input type="file" id="audio-file-input" accept="audio/*" style="display:none" onchange="handleAudioUpload(this)"/>
          </div>
          <div class="clip-list-label">Available Recordings</div>
          <div id="audio-clips-list">
            <div class="audio-clip selected" id="clip-default" onclick="selectClip('default')">
              <div class="audio-clip-icon">${IC.play}</div>
              <div style="flex:1">
                <div class="audio-clip-name">${defaultClip.name}</div>
                <div class="audio-clip-meta">${defaultClip.duration} · Auto-saved from today's call</div>
              </div>
              <div class="audio-waveform">${makeWaveform(defaultClip.seed)}</div>
            </div>
          </div>
        </div>
        <div id="analysis-section" style="display:none"></div>
        <div style="display:flex;gap:10px;margin-top:16px;align-items:center">
          <button class="btn btn-outlined btn-sm" id="analyse-btn" onclick="runAnalysis(${taskId})" style="gap:6px">
            ${IC.star} Analyse Recording
          </button>
          <span class="text-sm text-muted" id="analyse-hint">Select a recording and click Analyse for AI insights</span>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outlined" id="mc">Cancel</button>
        <button class="btn btn-success" id="mok">Submit Completion</button>
      </div>
    </div>`;
    document.body.appendChild(ov);
    ov.querySelector('#mc').onclick=()=>ov.remove();
    ov.querySelector('#mok').onclick=()=>{
      const proof=ov.querySelector('#proof-note').value.trim();
      if(!proof){showToast('Please add a completion note','error');return;}
      const task=STATE.tasks.find(t=>t.id===taskId);
      if(task){task.status='completed';task.proof=proof;if(window._lastAnalysis){task.analysis=window._lastAnalysis;window._lastAnalysis=null;}}
      if(STATE.currentUser.performance<100) STATE.currentUser.performance=Math.min(100,(STATE.currentUser.performance||0)+5);
      showToast('Task marked complete.','success');ov.remove();renderSP();
    };
    ov.onclick=(e)=>{if(e.target===ov)ov.remove();};
    window._lastAnalysis=null;
    window._selectedClip='default';
  };

  window.selectClip=(id)=>{
    document.querySelectorAll('.audio-clip').forEach(el=>el.classList.remove('selected'));
    const el=document.getElementById('clip-'+id); if(el) el.classList.add('selected');
    window._selectedClip=id;
    const as=document.getElementById('analysis-section'); if(as) as.style.display='none';
    const hint=document.getElementById('analyse-hint'); if(hint) hint.textContent='Select a recording and click Analyse for AI insights';
  };

  window.handleAudioUpload=(input)=>{
    if(!input.files.length) return;
    const file=input.files[0];
    const dur='3:'+String(Math.floor(Math.random()*59)).padStart(2,'0');
    const newId='uploaded-'+Date.now();
    document.getElementById('audio-clips-list').insertAdjacentHTML('beforeend',`
      <div class="audio-clip" id="clip-${newId}" onclick="selectClip('${newId}')">
        <div class="audio-clip-icon">${IC.play}</div>
        <div style="flex:1">
          <div class="audio-clip-name">${file.name}</div>
          <div class="audio-clip-meta">${dur} · Just uploaded</div>
        </div>
        <div class="audio-waveform">${makeWaveform(Math.random()*10)}</div>
      </div>`);
    selectClip(newId);
    showToast('Audio file uploaded','success');
  };

  window.runAnalysis=(taskId)=>{
    const btn=document.getElementById('analyse-btn'),hint=document.getElementById('analyse-hint'),as=document.getElementById('analysis-section');
    if(!window._selectedClip){showToast('Please select an audio clip first','error');return;}
    as.style.display='block';
    as.innerHTML=`<div class="spinner-wrap"><div class="spinner"></div><div class="spinner-text">Analysing call recording…</div><div class="spinner-sub">Extracting deal signals and follow-up indicators</div></div>`;
    if(btn) btn.disabled=true;
    if(hint) hint.textContent='Analysis in progress…';
    setTimeout(()=>{
      const prob=68+Math.floor(Math.random()*20);
      const engOpts=['High','Medium-High','High','Very High'];
      const engagement=engOpts[Math.floor(Math.random()*engOpts.length)];
      const trailUnits=2+Math.floor(Math.random()*4);
      const discount=(5+Math.floor(Math.random()*12))+'%';
      const followUpDate=new Date(Date.now()+(7+Math.floor(Math.random()*14))*86400000).toISOString().split('T')[0];
      const summaries=[
        'Client showed strong interest. Key decision-maker was present. Pricing negotiation likely at next touchpoint.',
        'Positive reception from procurement. Technical requirements were discussed. Recommend sending brochure before follow-up.',
        'Client is comparing with a competitor. Emphasised after-sales support. Trial units requested — recommend fulfilling promptly.',
      ];
      const summary=summaries[Math.floor(Math.random()*summaries.length)];
      const analysis={dealClosingProbability:prob,followUpDate,engagement,trailUnits,discount,summary};
      window._lastAnalysis=analysis;
      const probClass=prob>=70?'good':prob>=40?'warn':'';
      as.innerHTML=`<div class="analysis-report">
        <div class="analysis-report-header">${IC.star} AI Call Analysis Report <span class="chip chip-analysis" style="font-size:10px;margin-left:4px">AI Generated</span></div>
        <table class="analysis-kpi-table">
          <thead><tr><th>Deal Probability</th><th>Follow-up Date</th><th>Engagement</th><th>Trial Units</th><th>Discount Discussed</th></tr></thead>
          <tbody><tr>
            <td class="kpi-num ${probClass}">${prob}%</td>
            <td style="font-weight:600;font-size:13px">${fmtDate(followUpDate)}</td>
            <td class="kpi-num" style="color:var(--accent)">${engagement}</td>
            <td class="kpi-num">${trailUnits}</td>
            <td class="kpi-num">${discount}</td>
          </tr></tbody>
        </table>
        <div class="analysis-summary-box"><div class="analysis-summary-label">Summary</div>${summary}</div>
      </div>`;
      if(btn) btn.disabled=false;
      if(hint) hint.textContent='Analysis complete. Submit to save this report.';
    },2200);
  };

  window.showRaiseRequestModal=(taskId)=>{
    showModal('Raise Request',`
      <div class="form-row"><label class="form-label">Request Type</label>
        <select class="form-select" id="req-type">
          <option value="expense">Expense Reimbursement</option>
          <option value="followup">Follow-up Visit</option>
          <option value="leave">Leave</option>
        </select>
      </div>
      <div class="form-row"><label class="form-label">Title</label><input class="form-input" id="req-title" placeholder="e.g. Extra travel expense"/></div>
      <div class="form-row"><label class="form-label">Description</label><textarea class="form-textarea" id="req-desc" placeholder="Explain your request in detail..."></textarea></div>
      <div class="form-row"><label class="form-label">Amount (Rs.) — if applicable</label><input class="form-input" type="number" id="req-amount" placeholder="0"/></div>`,
      (ov)=>{
        const type=ov.querySelector('#req-type').value,title=ov.querySelector('#req-title').value.trim(),
          desc=ov.querySelector('#req-desc').value.trim(),amount=parseInt(ov.querySelector('#req-amount').value)||0;
        if(!title||!desc){showToast('Please fill all required fields','error');return false;}
        STATE.requests.push({id:STATE.nextRequestId++,type,title,description:desc,amount,raisedBy:STATE.currentUser.id,managerId:STATE.currentUser.managerId,taskId,status:'pending',managerNote:'',createdAt:new Date().toISOString().split('T')[0]});
        showToast('Request submitted.','info');spSection='requests';renderSP();return true;
      },'Submit Request');
  };

  window.showLeaveRequestModal=()=>{
    const today=new Date().toISOString().split('T')[0];
    showModal('Apply for Leave',`
      <div style="display:flex;align-items:flex-start;gap:10px;padding:12px 14px;background:var(--brand-light);border-radius:var(--radius-sm);border:1px solid #C6DAFC;margin-bottom:16px">
        ${IC.info}
        <span style="font-size:13px;color:var(--brand-dark);line-height:1.5">Your leave request will be sent to your manager for approval.</span>
      </div>
      <div class="form-row"><label class="form-label">Leave Date</label><input class="form-input" type="date" id="leave-date" min="${today}"/></div>
      <div class="form-row"><label class="form-label">Reason for Leave</label><textarea class="form-textarea" id="leave-reason" placeholder="Please provide a reason..."></textarea></div>`,
      (ov)=>{
        const leaveDate=ov.querySelector('#leave-date').value,reason=ov.querySelector('#leave-reason').value.trim();
        if(!leaveDate){showToast('Please select a leave date','error');return false;}
        if(!reason){showToast('Please provide a reason','error');return false;}
        STATE.requests.push({id:STATE.nextRequestId++,type:'leave',title:`Leave Request — ${fmtDate(leaveDate)}`,description:reason,amount:0,leaveDate,raisedBy:STATE.currentUser.id,managerId:STATE.currentUser.managerId,taskId:null,status:'pending',managerNote:'',createdAt:new Date().toISOString().split('T')[0]});
        showToast('Leave request submitted','success');renderSP();return true;
      },'Apply for Leave');
  };
}

// Boot
renderLogin();
</script>
</body>
</html>
